<div [routerLink]="['/category', category.name.toLowerCase()]" 
     class="group relative bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-500 cursor-pointer border border-gray-100 h-full flex flex-col">
  
  <div class="relative h-48 overflow-hidden">
    <img [src]="category.image" [alt]="category.name" 
         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-end p-6">
      <span class="text-white font-medium flex items-center gap-2">
        Explore Collection <mat-icon class="text-sm">arrow_forward</mat-icon>
      </span>
    </div>
    <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-md p-2 rounded-xl shadow-sm">
      <mat-icon class="text-indigo-600">{{ category.icon }}</mat-icon>
    </div>
  </div>

  <div class="p-6 flex-grow flex flex-col">
    <div class="flex justify-between items-start mb-2">
      <h3 class="text-xl font-bold text-gray-900 group-hover:text-indigo-600 transition-colors">{{ category.name }}</h3>
      <span class="bg-indigo-50 text-indigo-600 text-xs font-bold px-3 py-1 rounded-full">
        {{ category.productCount || 0 }} Products
      </span>
    </div>
    <p class="text-gray-500 text-sm line-clamp-2 mb-6 flex-grow">
      {{ category.description }}
    </p>
    
    <div class="flex items-center text-indigo-600 font-bold text-sm">
      <span class="mr-2">View Category</span>
      <mat-icon class="transition-transform duration-300 group-hover:translate-x-2">trending_flat</mat-icon>
    </div>
  </div>
</div>
