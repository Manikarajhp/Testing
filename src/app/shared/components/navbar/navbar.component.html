<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm transition-colors">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">
      <!-- Logo -->
      <div class="flex-shrink-0 flex items-center">
        <a routerLink="/home" class="text-2xl font-black bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent" id="navbar-logo">
          SHOP.
        </a>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex space-x-8 items-center" id="desktop-nav">
        <a routerLink="/home" routerLinkActive="text-indigo-600 border-indigo-600" [routerLinkActiveOptions]="{exact: true}" 
           class="text-gray-600 hover:text-indigo-600 font-medium transition-colors py-2 border-b-2 border-transparent" id="nav-home-link">
          Home
        </a>
        <a routerLink="/category" routerLinkActive="text-indigo-600 border-indigo-600" 
           class="text-gray-600 hover:text-indigo-600 font-medium transition-colors py-2 border-b-2 border-transparent" id="nav-category-link">
          Category
        </a>
        <a routerLink="/orders" routerLinkActive="text-indigo-600 border-indigo-600" 
           class="text-gray-600 hover:text-indigo-600 font-medium transition-colors py-2 border-b-2 border-transparent" id="nav-orders-link">
          My Orders
        </a>
      </div>

      <!-- Icons & Mobile Toggle -->
      <div class="flex items-center space-x-2">
        <button mat-icon-button class="text-gray-600 hover:text-indigo-600 transition-colors relative" routerLink="/cart" id="nav-cart-btn">
          <mat-icon>shopping_cart</mat-icon>
          @if (cartService.cartCount() > 0) {
            <span class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold h-4 w-4 flex items-center justify-center rounded-full" id="nav-cart-count">
              {{ cartService.cartCount() }}
            </span>
          }
        </button>
        <button mat-icon-button class="text-gray-600 hover:text-indigo-600 transition-colors" routerLink="/profile" id="nav-profile-btn">
          <mat-icon>person</mat-icon>
        </button>

        @if (authService.currentUser()) {
          <button mat-icon-button class="hidden md:flex text-gray-600 hover:text-red-600 transition-colors" (click)="authService.logout()" id="nav-logout-btn">
            <mat-icon>logout</mat-icon>
          </button>
        }
      </div>
    </div>
  </div>

  <!-- Mobile Navigation Overlay -->
  @if (isMenuOpen()) {
    <div class="md:hidden bg-white border-b border-gray-100 animate-in slide-in-from-top duration-300" id="mobile-menu">
      <div class="px-4 pt-2 pb-6 space-y-2">
        <a routerLink="/home" (click)="toggleMenu()" class="block px-4 py-3 rounded-xl text-gray-600 hover:bg-indigo-50 font-medium" id="mobile-nav-home-link">Home</a>
        <a routerLink="/category" (click)="toggleMenu()" class="block px-4 py-3 rounded-xl text-gray-600 hover:bg-indigo-50 font-medium" id="mobile-nav-category-link">Category</a>
        <a routerLink="/orders" (click)="toggleMenu()" class="block px-4 py-3 rounded-xl text-gray-600 hover:bg-indigo-50 font-medium" id="mobile-nav-orders-link">My Orders</a>
        @if (authService.currentUser()) {
          <div class="pt-4 border-t border-gray-100">
            <button (click)="authService.logout()" class="w-full text-left px-4 py-3 rounded-xl text-red-600 hover:bg-red-50 font-bold" id="mobile-nav-logout-btn">
              Logout
            </button>
          </div>
        }
      </div>
    </div>
  }
</nav>
